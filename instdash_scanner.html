<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>InstDash Scanner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@700;800&display=swap');

  :root {
    --bg:       #090b0f;
    --bg2:      #0f1318;
    --bg3:      #151a22;
    --border:   #1e2530;
    --border2:  #2a3340;
    --gold:     #f5c542;
    --green:    #3ddc84;
    --red:      #ff4d6a;
    --blue:     #4db8ff;
    --gray:     #4a5568;
    --silver:   #8896a8;
    --white:    #e8edf3;
    --orange:   #ff8c42;
    --teal:     #2dd4bf;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(180deg, #0d1420 0%, var(--bg) 100%);
    border-bottom: 1px solid var(--border);
    padding: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: var(--gold);
    letter-spacing: 1px;
  }
  .logo span { color: var(--silver); font-weight: 700; font-size: 13px; margin-left: 6px; }
  .clock {
    font-size: 11px;
    color: var(--silver);
    background: var(--bg3);
    padding: 4px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .ctrl-group {
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .ctrl-label {
    font-size: 10px;
    color: var(--silver);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-right: 2px;
  }
  .btn-toggle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 4px;
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--silver);
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-toggle.active {
    background: var(--border2);
    color: var(--white);
    border-color: var(--blue);
  }
  .btn-toggle.active-tf { border-color: var(--gold); color: var(--gold); }

  .btn-scan {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 8px 20px;
    border-radius: 6px;
    border: none;
    background: linear-gradient(135deg, var(--gold), #e0a800);
    color: #000;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
  }
  .btn-scan:active { transform: scale(0.97); opacity: 0.9; }
  .btn-scan:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── Score filter ── */
  .score-ctrl {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: auto;
  }
  .score-input {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    width: 44px;
    padding: 4px 6px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 4px;
    color: var(--gold);
    text-align: center;
  }
  .score-input:focus { outline: none; border-color: var(--gold); }

  /* ── Progress ── */
  .progress-bar {
    height: 2px;
    background: var(--border);
    margin-top: 10px;
    border-radius: 1px;
    overflow: hidden;
    display: none;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--teal));
    width: 0%;
    transition: width 0.3s ease;
    border-radius: 1px;
  }
  .progress-bar.active { display: block; }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex;
    gap: 12px;
    padding: 8px 16px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    flex-wrap: wrap;
  }
  .stat { display: flex; align-items: center; gap: 5px; }
  .stat-val { font-weight: 700; }
  .stat-val.green { color: var(--green); }
  .stat-val.red   { color: var(--red); }
  .stat-val.gold  { color: var(--gold); }

  /* ── Filters ── */
  .filter-bar {
    display: flex;
    gap: 6px;
    padding: 8px 16px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--silver);
    cursor: pointer;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.15s;
  }
  .filter-btn.active {
    background: var(--border2);
    color: var(--white);
    border-color: var(--silver);
  }
  .filter-btn.long.active  { background: rgba(61,220,132,0.15); border-color: var(--green); color: var(--green); }
  .filter-btn.short.active { background: rgba(255,77,106,0.15); border-color: var(--red);   color: var(--red); }

  /* ── Results ── */
  .results {
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .section-title {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--silver);
    text-transform: uppercase;
    padding: 8px 4px 4px;
    border-bottom: 1px solid var(--border);
    margin-top: 4px;
  }

  /* ── Card ── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .card.long  { border-left: 3px solid var(--green); }
  .card.short { border-left: 3px solid var(--red); }
  .card.watch { border-left: 3px solid var(--gold); }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px 8px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .card-left { display: flex; align-items: center; gap: 8px; }
  .ticker {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 800;
    color: var(--white);
    letter-spacing: 0.5px;
  }
  .tf-badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 3px;
    border: 1px solid var(--border2);
    color: var(--silver);
    background: var(--bg3);
  }
  .cat-badge {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    color: var(--gray);
    border: 1px solid var(--border);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .card-right { display: flex; align-items: center; gap: 8px; }

  .score-badge {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 800;
    min-width: 52px;
    text-align: right;
  }
  .score-badge.strong-long  { color: var(--green); }
  .score-badge.strong-short { color: var(--red); }
  .score-badge.mild-long    { color: #7dd69f; }
  .score-badge.mild-short   { color: #e07080; }
  .score-badge.neutral      { color: var(--silver); }

  .signal-pill {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 12px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .signal-pill.long  { background: rgba(61,220,132,0.12); color: var(--green); border: 1px solid rgba(61,220,132,0.3); }
  .signal-pill.short { background: rgba(255,77,106,0.12);  color: var(--red);   border: 1px solid rgba(255,77,106,0.3); }
  .signal-pill.watch { background: rgba(245,197,66,0.12);  color: var(--gold);  border: 1px solid rgba(245,197,66,0.3); }

  .expand-icon { color: var(--gray); font-size: 12px; transition: transform 0.2s; }
  .card.expanded .expand-icon { transform: rotate(180deg); }

  /* ── Card body ── */
  .card-body {
    display: none;
    padding: 0 12px 12px;
    border-top: 1px solid var(--border);
  }
  .card.expanded .card-body { display: block; }

  .metrics {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-top: 10px;
  }
  .metric {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 7px 10px;
  }
  .metric-label {
    font-size: 9px;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 3px;
  }
  .metric-val {
    font-size: 13px;
    font-weight: 600;
    color: var(--white);
  }
  .metric-val.green  { color: var(--green); }
  .metric-val.red    { color: var(--red); }
  .metric-val.gold   { color: var(--gold); }
  .metric-val.orange { color: var(--orange); }
  .metric-val.teal   { color: var(--teal); }

  .rr-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 8px;
    padding: 6px 10px;
    background: var(--bg3);
    border-radius: 5px;
    border: 1px solid var(--border);
  }
  .rr-label { font-size: 10px; color: var(--silver); }
  .rr-val {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--gold);
  }

  .rec-row {
    margin-top: 6px;
    font-size: 10px;
    color: var(--gray);
    text-align: right;
  }

  /* ── Empty / Loading / Error ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--gray);
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-title { font-family: 'Syne', sans-serif; font-size: 16px; color: var(--silver); margin-bottom: 8px; }
  .empty-sub { font-size: 12px; line-height: 1.6; }

  .scanning-msg {
    text-align: center;
    padding: 40px 20px;
    color: var(--silver);
  }
  .scanning-ticker {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    color: var(--gold);
    margin-bottom: 8px;
    animation: pulse 1s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .scanning-sub { font-size: 11px; color: var(--gray); }

  .error-card {
    background: rgba(255,77,106,0.05);
    border: 1px solid rgba(255,77,106,0.2);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 11px;
    color: var(--red);
    margin-top: 4px;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">

      <button class="btn-toggle active-tf" data-tf="4H"     onclick="toggleTF(this)">4H</button>

<!-- RESULTS -->
<div class="results" id="results">

    <div class="empty-icon">🔍</div>
    <div class="empty-title">Pronto para scan</div>
    <div class="empty-sub">Selecciona os timeframes<br>e clica SCAN</div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
// CONFIG — ATIVOS
// ══════════════════════════════════════════════════════
const ATIVOS = [
  // Crypto
  { symbol:"BTCUSDT",   exchange:"BINANCE",  cat:"crypto"  },
  { symbol:"ETHUSDT",   exchange:"BINANCE",  cat:"crypto"  },
  { symbol:"BNBUSDT",   exchange:"BINANCE",  cat:"crypto"  },
  { symbol:"SOLUSDT",   exchange:"BINANCE",  cat:"crypto"  },
  { symbol:"XRPUSDT",   exchange:"BINANCE",  cat:"crypto"  },
  { symbol:"ADAUSDT",   exchange:"BINANCE",  cat:"crypto"  },
  { symbol:"AVAXUSDT",  exchange:"BINANCE",  cat:"crypto"  },
  { symbol:"DOTUSDT",   exchange:"BINANCE",  cat:"crypto"  },
  { symbol:"LINKUSDT",  exchange:"BINANCE",  cat:"crypto"  },
  { symbol:"UNIUSDT",   exchange:"BINANCE",  cat:"crypto"  },
  { symbol:"LTCUSDT",   exchange:"BINANCE",  cat:"crypto"  },
  { symbol:"ATOMUSDT",  exchange:"BINANCE",  cat:"crypto"  },
  { symbol:"NEARUSDT",  exchange:"BINANCE",  cat:"crypto"  },
  { symbol:"APTUSDT",   exchange:"BINANCE",  cat:"crypto"  },
  { symbol:"ARBUSDT",   exchange:"BINANCE",  cat:"crypto"  },
  { symbol:"OPUSDT",    exchange:"BINANCE",  cat:"crypto"  },
  { symbol:"INJUSDT",   exchange:"BINANCE",  cat:"crypto"  },
  { symbol:"MATICUSDT", exchange:"BINANCE",  cat:"crypto"  },
  // Metais
  { symbol:"XAUUSD",    exchange:"OANDA",    cat:"metal"   },
  { symbol:"XAGUSD",    exchange:"OANDA",    cat:"metal"   },
  // Energia
  { symbol:"USOIL",     exchange:"TVC",      cat:"energy"  },
  { symbol:"UKOIL",     exchange:"TVC",      cat:"energy"  },
];





// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
let allResults  = [];
let activeFilter = "all";
let scanning    = false;

// ── Clock ──────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById("clock").textContent =
    now.toUTCString().slice(17,25) + " UTC";
}
setInterval(updateClock, 1000);
updateClock();

// ── TF toggle ──────────────────────────────────────────
function toggleTF(btn) {
  btn.classList.toggle("active-tf");
}

function getSelectedTFs() {
  return [...document.querySelectorAll(".btn-toggle[data-tf]")]
    .filter(b => b.classList.contains("active-tf"))
    .map(b => b.dataset.tf);
}

// ── Filter ─────────────────────────────────────────────
function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderResults();
}

// ══════════════════════════════════════════════════════
// CÁLCULO DO SCORE
// ══════════════════════════════════════════════════════
function calcScore(ind, summ) {
  let score = 0;

  const close  = ind.close  || 0;
  const ema9   = ind.EMA9   || ind.EMA10 || 0;
  const ema21  = ind.EMA20  || 0;
  const ema200 = ind.EMA200 || 0;
  const rsi    = ind.RSI    || 50;
  const macd   = ind["MACD.macd"]   || 0;
  const sig    = ind["MACD.signal"] || 0;
  const bbUp   = ind["BB.upper"]    || 0;
  const bbLow  = ind["BB.lower"]    || 0;
  const bbMid  = ind["BB.basis"]    || (bbUp + bbLow) / 2 || 0;
  const atr    = ind.ATR            || close * 0.01;

  // 1. EMA trend
  if (close && ema200) {
    if (close > ema200 && ema9 > ema21) score += 1;
    else if (close < ema200 && ema9 < ema21) score -= 1;
  }
  // 2. MACD
  if (macd && sig) score += macd > sig ? 1 : -1;

  // 3. RSI momentum
  if (rsi > 55) score += 1;
  else if (rsi < 45) score -= 1;

  // 4. Preço vs BB mid
  if (bbMid) score += close > bbMid ? 1 : -1;

  // 5. Oscillators rec
  const osc = summ.OSCILLATORS?.RECOMMENDATION || "NEUTRAL";
  if (osc === "BUY")         score += 1;
  else if (osc === "SELL")   score -= 1;
  else if (osc === "STRONG_BUY")  score += 2;
  else if (osc === "STRONG_SELL") score -= 2;

  // 6. MA rec
  const ma = summ.MOVING_AVERAGES?.RECOMMENDATION || "NEUTRAL";
  if (ma === "BUY")         score += 1;
  else if (ma === "SELL")   score -= 1;
  else if (ma === "STRONG_BUY")  score += 2;
  else if (ma === "STRONG_SELL") score -= 2;

  // 7. RSI zona
  if (rsi > 50 && rsi < 70)  score += 1;
  else if (rsi < 50 && rsi > 30) score -= 1;

  // Squeeze (BB width vs ATR)
  const bbW = bbUp - bbLow;
  const squeeze = bbW > 0 && atr > 0 && bbW < atr * 2;

  // SL / TP
  const slL = close - atr * 2;
  const tpL = close + atr * 4;
  const slS = close + atr * 2;
  const tpS = close - atr * 4;
  const rrL = close !== slL ? Math.abs(tpL - close) / Math.abs(close - slL) : 0;
  const rrS = close !== slS ? Math.abs(tpS - close) / Math.abs(close - slS) : 0;

  let setup;
  if      (score >= 8  && !squeeze) setup = "LONG valido";
  else if (score <= -8 && !squeeze) setup = "SHORT valido";
  else if (score >= 6  && !squeeze) setup = "Aguardar zona";
  else if (squeeze)                 setup = "Aguarda SQ";
  else if (Math.abs(score) < 4)     setup = "Sem setup";
  else                              setup = "Score baixo";

  const rec = summ.RECOMMENDATION || "NEUTRAL";

  return { score, rsi: rsi.toFixed(1), squeeze, setup, rec,
           close, slL, tpL, slS, tpS,
           rrL: rrL.toFixed(1), rrS: rrS.toFixed(1) };
}

// ══════════════════════════════════════════════════════
// FETCH TradingView (via proxy público)
// ══════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════
// FETCH TradingView — batch por timeframe (sem CORS)
// Um único pedido por TF com todos os símbolos
// ══════════════════════════════════════════════════════

const COLS = [
  "close","EMA9","EMA10","EMA20","EMA50","EMA200",
  "RSI","MACD.macd","MACD.signal",
  "BB.upper","BB.lower","BB.basis","ATR",
  "Recommend.All","Recommend.MA","Recommend.Other"
];

const TV_TF = { "15min":"15", "1H":"60", "4H":"240", "1D":"1D" };

async function fetchTVBatch(ativos, tf) {
  const tvTf = TV_TF[tf] || "60";
  const tickers = ativos.map(a => `${a.exchange}:${a.symbol}`);
  const url = `https://scanner.tradingview.com/scan?interval=${tvTf}`;
  const body = {
    symbols: { tickers, query: { types: [] } },
    columns: COLS,
  };
  const resp = await fetch(url, {
    method:  "POST",
    headers: { "Content-Type": "application/json" },
    body:    JSON.stringify(body),
    signal:  AbortSignal.timeout(15000),
  });
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const data = await resp.json();
  if (!data.data) throw new Error("Resposta inválida");

  const results = {};
  data.data.forEach((row, i) => {
    const sym = ativos[i]?.symbol;
    if (!sym || !row.d) return;
    const ind = {};
    COLS.forEach((c, j) => ind[c] = row.d[j]);
    const toStr = v => !v ? "NEUTRAL" : v >= 0.5 ? "STRONG_BUY" : v >= 0.1 ? "BUY" :
                       v <= -0.5 ? "STRONG_SELL" : v <= -0.1 ? "SELL" : "NEUTRAL";
    const summ = {
      RECOMMENDATION:  toStr(ind["Recommend.All"]),
      MOVING_AVERAGES: { RECOMMENDATION: toStr(ind["Recommend.MA"]) },
      OSCILLATORS:     { RECOMMENDATION: toStr(ind["Recommend.Other"]) },
    };
    results[sym] = calcScore(ind, summ);
  });
  return results;
}

// ══════════════════════════════════════════════════════
// SCAN — batch por TF (1 pedido por timeframe)
// ══════════════════════════════════════════════════════
async function runScan() {
  if (scanning) return;

  const tfs = getSelectedTFs();
  if (!tfs.length) { alert("Selecciona pelo menos um timeframe."); return; }

  const scoreMin = parseInt(document.getElementById("scoreMin").value) || 8;
  scanning = true;

  const btn = document.getElementById("btnScan");
  btn.disabled = true;
  btn.textContent = "⏳ A scan...";

  document.getElementById("statsBar").style.display  = "none";
  document.getElementById("filterBar").style.display = "none";

  const progressBar  = document.getElementById("progressBar");
  const progressFill = document.getElementById("progressFill");
  progressBar.classList.add("active");
  allResults = [];

  document.getElementById("results").innerHTML = `
    <div class="scanning-msg">
      <div class="scanning-ticker" id="scanTicker">A carregar...</div>
      <div class="scanning-sub">A consultar TradingView...</div>
    </div>`;

  let done = 0;
  for (const tf of tfs) {
    const tickerEl = document.getElementById("scanTicker");
    if (tickerEl) tickerEl.textContent = `Timeframe ${tf}`;

    try {
      const batchRes = await fetchTVBatch(ATIVOS, tf);
      ATIVOS.forEach(ativo => {
        const r = batchRes[ativo.symbol];
        if (r) {
          allResults.push({ symbol: ativo.symbol, exchange: ativo.exchange,
                            cat: ativo.cat, tf, ...r, error: null });
        } else {
          allResults.push({ symbol: ativo.symbol, exchange: ativo.exchange,
                            cat: ativo.cat, tf, score: 0, error: "sem dados" });
        }
      });
    } catch(e) {
      ATIVOS.forEach(ativo => {
        allResults.push({ symbol: ativo.symbol, exchange: ativo.exchange,
                          cat: ativo.cat, tf, score: 0, error: e.message });
      });
    }

    done++;
    progressFill.style.width = `${(done / tfs.length) * 100}%`;
    if (done < tfs.length) await new Promise(r => setTimeout(r, 500));
  }

  progressBar.classList.remove("active");
  progressFill.style.width = "0%";

  const longs  = allResults.filter(r => !r.error && r.score >=  scoreMin);
  const shorts = allResults.filter(r => !r.error && r.score <= -scoreMin);
  const valid  = allResults.filter(r => !r.error);

  document.getElementById("statTotal").textContent = valid.length;
  document.getElementById("statLong").textContent  = longs.length;
  document.getElementById("statShort").textContent = shorts.length;
  document.getElementById("statTime").textContent  =
    new Date().toUTCString().slice(17,25) + " UTC";

  document.getElementById("statsBar").style.display  = "flex";
  document.getElementById("filterBar").style.display = "flex";

  renderResults(scoreMin);

  scanning = false;
  btn.disabled = false;
  btn.textContent = "▶ SCAN";
}

// ══════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════
function renderResults(scoreMinOverride) {
  const scoreMin = scoreMinOverride ||
    parseInt(document.getElementById("scoreMin").value) || 8;

  let filtered = allResults.filter(r => !r.error);

  // Filtro direcção/categoria
  if (activeFilter === "long")   filtered = filtered.filter(r => r.score >=  scoreMin);
  else if (activeFilter === "short") filtered = filtered.filter(r => r.score <= -scoreMin);
  else if (activeFilter === "crypto") filtered = filtered.filter(r => r.cat === "crypto");
  else if (activeFilter === "metal")  filtered = filtered.filter(r => r.cat === "metal");
  else if (activeFilter === "energy") filtered = filtered.filter(r => r.cat === "energy");
  else filtered = filtered.filter(r => Math.abs(r.score) >= scoreMin);

  // Ordenar por score absoluto
  filtered.sort((a, b) => Math.abs(b.score) - Math.abs(a.score));

  const container = document.getElementById("results");

  if (!filtered.length) {
    const erros = allResults.filter(r => r.error).length;
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">${erros > 5 ? "⚠️" : "😴"}</div>
        <div class="empty-title">${erros > 5 ? "Erros de ligação" : "Sem setups"}</div>
        <div class="empty-sub">${erros > 5
          ? `${erros} ativos falharam.<br>Verifica a ligação e tenta novamente.`
          : `Nenhum ativo com score ≥ ${scoreMin}<br>Tenta reduzir o score mínimo.`}
        </div>
      </div>`;
    return;
  }

  // Agrupar por categoria
  const cats   = ["crypto","metal","energy"];
  const labels = { crypto:"CRYPTO", metal:"METAIS", energy:"ENERGIA" };
  let html     = "";

  for (const cat of cats) {
    const items = filtered.filter(r => r.cat === cat);
    if (!items.length) continue;
    html += `<div class="section-title">${labels[cat]}</div>`;
    items.forEach(r => { html += buildCard(r, scoreMin); });
  }

  container.innerHTML = html;
}

function buildCard(r, scoreMin) {
  const isLong  = r.score >= scoreMin;
  const isShort = r.score <= -scoreMin;
  const dir     = isLong ? "long" : isShort ? "short" : "watch";

  const scoreClass = r.score >= 8 ? "strong-long" : r.score <= -8 ? "strong-short" :
                     r.score >= 5 ? "mild-long"   : r.score <= -5  ? "mild-short" : "neutral";

  const sigLabel = isLong ? "🚀 LONG" : isShort ? "💀 SHORT" : "👀 WATCH";
  const catLabel = { crypto:"CRYPTO", metal:"METAL", energy:"OIL/GAS" }[r.cat] || r.cat;

  // Formatação de preços
  const fmt = v => {
    if (!v) return "—";
    if (v > 1000)  return v.toFixed(2);
    if (v > 1)     return v.toFixed(4);
    return v.toFixed(6);
  };

  const sl   = isLong  ? r.slL : r.slS;
  const tp   = isLong  ? r.tpL : r.tpS;
  const rr   = isLong  ? r.rrL : r.rrS;
  const slC  = "red";
  const tpC  = "green";

  const sqIcon = r.squeeze ? "🔴" : "✅";
  const recC   = r.rec?.includes("BUY") ? "green" : r.rec?.includes("SELL") ? "red" : "";

  const id = `card_${r.symbol}_${r.tf}`.replace(/[^a-z0-9_]/gi,"_");

  return `
<div class="card ${dir}" id="${id}">
  <div class="card-header" onclick="toggleCard('${id}')">
    <div class="card-left">
      <span class="ticker">${r.symbol.replace("USDT","")}<span style="color:var(--gray);font-size:11px">${r.symbol.endsWith("USDT") ? "/USDT" : ""}</span></span>
      <span class="tf-badge">${r.tf}</span>
      <span class="cat-badge">${catLabel}</span>
    </div>
    <div class="card-right">
      <span class="score-badge ${scoreClass}">${r.score > 0 ? "+" : ""}${r.score}</span>
      <span class="signal-pill ${dir}">${sigLabel}</span>
      <span class="expand-icon">▼</span>
    </div>
  </div>
  <div class="card-body">
    <div class="metrics">
      <div class="metric">
        <div class="metric-label">Preço</div>
        <div class="metric-val">${fmt(r.close)}</div>
      </div>
      <div class="metric">
        <div class="metric-label">RSI</div>
        <div class="metric-val ${parseFloat(r.rsi) > 60 ? "orange" : parseFloat(r.rsi) < 40 ? "teal" : ""}">${r.rsi}</div>
      </div>
      <div class="metric">
        <div class="metric-label">SL</div>
        <div class="metric-val red">${fmt(sl)}</div>
      </div>
      <div class="metric">
        <div class="metric-label">TP</div>
        <div class="metric-val green">${fmt(tp)}</div>
      </div>
      <div class="metric">
        <div class="metric-label">Setup</div>
        <div class="metric-val ${dir === "long" ? "green" : dir === "short" ? "red" : "gold"}" style="font-size:11px">${r.setup}</div>
      </div>
      <div class="metric">
        <div class="metric-label">Squeeze</div>
        <div class="metric-val">${sqIcon} ${r.squeeze ? "Ativo" : "OK"}</div>
      </div>
    </div>
    <div class="rr-row">
      <span class="rr-label">Risk : Reward</span>
      <span class="rr-val">${rr}R</span>
    </div>
    <div class="rec-row">TV Rec: <span style="color:var(--${recC || 'silver'})">${r.rec || "—"}</span></div>
  </div>
</div>`;
}

function toggleCard(id) {
  document.getElementById(id)?.classList.toggle("expanded");
}
</script>
